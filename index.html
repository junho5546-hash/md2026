<!DOCTYPE html>
<!-- 지도에서 나라 찾기 게임 - D3.js SVG 벡터 지도 기반 (홈·선택·게임·결과 화면) -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>지도에서 나라 찾기 🌍</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      width: 100vw; height: 100vh; overflow: hidden;
    }
    .screen { display: none; width: 100vw; height: 100vh; }
    .screen.active { display: flex; }

    /* ══ 홈 화면 ══ */
    #home-screen {
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #fff8e1, #e3f2fd 50%, #fce4ec);
      position: relative; overflow: hidden;
    }
    #home-screen::before, #home-screen::after {
      content: ''; position: absolute; border-radius: 50%; opacity: .15;
    }
    #home-screen::before { width:400px;height:400px;background:#42a5f5;top:-100px;left:-100px; }
    #home-screen::after  { width:300px;height:300px;background:#ef5350;bottom:-80px;right:-80px; }
    .home-globe {
      font-size: 6rem; position: relative; z-index: 1;
      animation: globeRock 4s ease-in-out infinite;
    }
    @keyframes globeRock {
      0%,100% { transform: rotate(-5deg) scale(1); }
      50%      { transform: rotate(5deg) scale(1.06); }
    }
    .home-title {
      font-size: 2.6rem; font-weight: 900; color: #1565c0;
      text-align: center; line-height: 1.2;
      text-shadow: 0 2px 0 #bbdefb; margin-top: .5rem;
      position: relative; z-index: 1;
    }
    .home-sub {
      margin-top: .6rem; font-size: 1.1rem; color: #555;
      text-align: center; position: relative; z-index: 1;
    }
    .home-deco {
      display: flex; gap: .5rem; margin: 1.2rem 0;
      font-size: 1.8rem; position: relative; z-index: 1;
    }
    .home-deco span { animation: bounce 1.4s ease-in-out infinite; }
    .home-deco span:nth-child(2){animation-delay:.12s}
    .home-deco span:nth-child(3){animation-delay:.24s}
    .home-deco span:nth-child(4){animation-delay:.36s}
    .home-deco span:nth-child(5){animation-delay:.48s}
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .mode-btns {
      display: flex; gap: 1.2rem; margin-top: .5rem;
      position: relative; z-index: 1; flex-wrap: wrap; justify-content: center;
    }
    .btn-mode {
      padding: .9rem 2.2rem; font-size: 1.2rem; font-weight: 800;
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-quiz {
      color: #fff; background: linear-gradient(135deg,#42a5f5,#1976d2);
      box-shadow: 0 6px 20px rgba(25,118,210,.4);
    }
    .btn-quiz:hover  { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(25,118,210,.5); }
    .btn-study {
      color: #fff; background: linear-gradient(135deg,#66bb6a,#2e7d32);
      box-shadow: 0 6px 20px rgba(46,125,50,.4);
    }
    .btn-study:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(46,125,50,.5); }

    /* 학습 모드 툴팁 */
    .map-tooltip {
      display: none; position: absolute; pointer-events: none; z-index: 100;
      background: rgba(21,101,192,.92); color: #fff;
      font-size: 1.05rem; font-weight: 800;
      padding: .35rem .8rem; border-radius: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      white-space: nowrap; transform: translateY(-4px);
    }
    /* 학습 모드: HUD 숨김 */
    .hud-hidden { display: none !important; }
    /* 학습 모드 question-bar */
    .question-bar.study-bar { background: #e8f5e9; border-bottom: 3px solid #4CAF50; }
    .question-bar.study-bar .question-label { color: #2e7d32; font-size: .9rem; }
    .question-bar.study-bar .question-country { font-size: 1.1rem; color: #555; animation: none; }

    /* ══ 지도 선택 화면 ══ */
    #select-screen { flex-direction: column; background: #f0f4ff; overflow-y: auto; }

    .select-header {
      background: linear-gradient(135deg,#1976d2,#42a5f5);
      padding: 1.1rem 1.4rem;
      display: flex; align-items: center; gap: 1rem;
      box-shadow: 0 3px 12px rgba(0,0,0,.15); flex-shrink: 0;
    }
    .btn-back {
      background: rgba(255,255,255,.25); border: none; border-radius: 50%;
      width: 44px; height: 44px; font-size: 1.2rem; cursor: pointer;
      color: #fff; display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-back:hover { background: rgba(255,255,255,.4); }
    .select-header-title { font-size: 1.4rem; font-weight: 800; color: #fff; }
    .select-header-sub   { font-size: .85rem; color: rgba(255,255,255,.8); }

    /* 대륙 카드 그리드 */
    .continent-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1.5rem;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }
    /* 세계지도 카드: 상단 전체 너비 */
    .continent-card.world-card { grid-column: 1 / -1; }

    .continent-card {
      background: var(--cc, #1976d2);
      border-radius: 22px;
      padding: 1.6rem 1.2rem;
      cursor: pointer;
      color: #fff;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
      transition: transform .18s, box-shadow .18s;
      position: relative;
      overflow: hidden;
    }
    .continent-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      pointer-events: none;
    }
    .continent-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0,0,0,.25);
    }
    .continent-card:active { transform: translateY(-2px); }
    .cc-emoji { font-size: 2.8rem; line-height: 1; }
    .world-card .cc-emoji { font-size: 3.5rem; }
    .cc-name {
      font-size: 1.2rem; font-weight: 900;
      margin-top: .5rem; letter-spacing: -.3px;
    }
    .world-card .cc-name { font-size: 1.5rem; }
    .cc-sub  {
      font-size: .82rem; opacity: .85; margin-top: .3rem;
      background: rgba(0,0,0,.15); display: inline-block;
      padding: 2px 10px; border-radius: 10px;
    }

    /* ══ 게임 화면 ══ */
    #game-screen { flex-direction: column; background: #1a237e; }

    .game-header {
      background: #1976d2; padding: .7rem 1rem;
      display: flex; align-items: center; gap: .8rem;
      flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .game-map-name { font-size: 1rem; font-weight: 800; color: #fff; flex: 1; }
    .hud-group { display: flex; gap: .6rem; align-items: center; }
    .streak-badge {
      background: rgba(255,255,255,.2); color: #fff;
      padding: 4px 10px; border-radius: 20px;
      font-weight: 700; font-size: .85rem; min-width: 72px; text-align: center;
      transition: background .3s;
    }
    .streak-badge.hot { background: rgba(255,152,0,.55); }
    .score-badge {
      background: #ffd740; color: #333;
      padding: 4px 12px; border-radius: 20px;
      font-weight: 800; font-size: .9rem; min-width: 72px; text-align: center;
    }

    .question-bar {
      background: #fff; padding: .75rem 1.5rem;
      text-align: center; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      transition: background .2s;
    }
    .question-bar.fb-correct { background: #e8f5e9; border-bottom: 3px solid #4CAF50; }
    .question-bar.fb-wrong   { background: #fce4ec; border-bottom: 3px solid #ef5350; }
    .question-label   { font-size: .8rem; color: #999; margin-bottom: 2px; }
    .question-country {
      font-size: 1.9rem; font-weight: 900; color: #1565c0;
      animation: qPulse 1.5s ease-in-out infinite alternate;
    }
    .question-bar.fb-correct .question-country { color: #2e7d32; animation: none; }
    .question-bar.fb-wrong   .question-country { color: #c62828; animation: none; font-size: 1.1rem; }
    @keyframes qPulse { from{transform:scale(1)} to{transform:scale(1.04)} }

    .map-area {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; min-height: 0;
    }
    #game-svg { width: 100%; height: 100%; background: #b3d9f5; cursor: grab; }
    #game-svg:active { cursor: grabbing; }

    .country {
      stroke: rgba(255,255,255,.7); stroke-width: .5px;
      transition: fill .25s, stroke .25s; cursor: pointer;
    }
    .country:hover { stroke: #fff; stroke-width: 1.5px; opacity: .85; }
    .country.flash-correct { stroke: #fff !important; stroke-width: 2px; }
    .country.flash-wrong   { stroke: #fff !important; stroke-width: 2px; }
    .country.flash-answer  {
      stroke: #fff !important; stroke-width: 2px;
      animation: answerGlow .8s ease-in-out infinite alternate;
    }
    @keyframes answerGlow { from{stroke-width:2px} to{stroke-width:5px} }

    .zoom-controls {
      position: absolute; right: 12px; top: 12px;
      display: flex; flex-direction: column; gap: 6px; z-index: 20;
    }
    .zoom-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,.9); border: none; cursor: pointer;
      font-size: 1.1rem; font-weight: 700; color: #333;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.2); transition: background .15s;
    }
    .zoom-btn:hover { background: #fff; }


    .loading-overlay {
      position: absolute; inset: 0; background: #1a237e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; z-index: 50; gap: 1rem;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 5px solid rgba(255,255,255,.2);
      border-top-color: #42a5f5;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .game-footer {
      background: #1565c0; padding: .4rem 1rem;
      display: flex; align-items: center; gap: .6rem; flex-shrink: 0;
    }
    .progress-wrap {
      flex: 1; background: rgba(255,255,255,.2);
      border-radius: 10px; height: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #69f0ae;
      border-radius: 10px; transition: width .4s ease;
    }
    .progress-text { color: rgba(255,255,255,.8); font-size: .8rem; font-weight: 700; white-space: nowrap; }

    /* ══ 결과 화면 ══ */
    #result-screen {
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#1565c0,#42a5f5);
      color: #fff; text-align: center; padding: 2rem;
    }
    .result-trophy { font-size: 5rem; animation: tPop .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes tPop { from{transform:scale(0) rotate(-15deg)} to{transform:scale(1) rotate(0)} }
    .result-title      { font-size: 1.6rem; font-weight: 900; margin: .4rem 0; }
    .result-score-big  { font-size: 4rem; font-weight: 900; color: #ffd740; text-shadow: 0 3px 0 rgba(0,0,0,.2); line-height: 1; }
    .result-score-label{ font-size: 1rem; opacity: .8; margin-top: .2rem; }
    .result-stats { display: flex; gap: 1.2rem; margin: 1.2rem 0; }
    .result-stat { background: rgba(255,255,255,.15); border-radius: 14px; padding: .8rem 1.4rem; }
    .result-stat-value { font-size: 1.8rem; font-weight: 900; }
    .result-stat-label { font-size: .78rem; opacity: .8; }
    .result-grade { font-size: 1.1rem; background: rgba(255,255,255,.15); padding: .5rem 1.5rem; border-radius: 20px; margin-bottom: 1.2rem; }
    .result-btns { display: flex; gap: .8rem; flex-wrap: wrap; justify-content: center; }
    .btn-result { padding: .85rem 1.8rem; border-radius: 50px; font-size: 1rem; font-weight: 800; border: none; cursor: pointer; transition: transform .15s; }
    .btn-result:hover { transform: translateY(-2px); }
    .btn-result.primary   { background: #ffd740; color: #333; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .btn-result.secondary { background: rgba(255,255,255,.2); color: #fff; }

    @media(max-width:480px) {
      .home-title { font-size: 2rem; }
      .continent-grid { grid-template-columns: 1fr; }
      .continent-card.world-card { grid-column: 1; }
      .question-country { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ══════════ 홈 화면 ══════════ -->
<section id="home-screen" class="screen active">
  <div class="home-globe">🌍</div>
  <h1 class="home-title">지도에서<br>나라 찾기</h1>
  <p class="home-sub">세계 지도를 보며 나라 위치를 맞춰봐요!</p>
  <div class="home-deco">
    <span>🗺️</span><span>✈️</span><span>🧭</span><span>🏳️</span><span>📍</span>
  </div>
  <div class="mode-btns">
    <button class="btn-mode btn-quiz"  onclick="chooseMode('quiz')">🎯 퀴즈 모드</button>
    <button class="btn-mode btn-study" onclick="chooseMode('study')">📚 학습 모드</button>
  </div>
</section>

<!-- ══════════ 지도 선택 화면 ══════════ -->
<section id="select-screen" class="screen">
  <div class="select-header">
    <button class="btn-back" onclick="showScreen('home-screen')">◀</button>
    <div>
      <div class="select-header-title">🗺️ 지도 선택</div>
      <div class="select-header-sub">공부하고 싶은 지역을 골라봐요!</div>
    </div>
  </div>
  <!-- 대륙 카드는 JS로 렌더링 -->
  <div class="continent-grid" id="continent-grid"></div>
</section>

<!-- ══════════ 게임 화면 ══════════ -->
<section id="game-screen" class="screen">
  <div class="game-header">
    <button class="btn-back" onclick="confirmExit()">◀</button>
    <div class="game-map-name" id="game-map-name"></div>
    <div class="hud-group" id="hud-group">
      <div class="streak-badge" id="streak-badge">🔥 0연속</div>
      <div class="score-badge"  id="score-badge">0점</div>
    </div>
  </div>
  <div class="question-bar">
    <div class="question-label">지도에서 찾아보세요!</div>
    <div class="question-country" id="question-country">—</div>
  </div>
  <div class="map-area" id="map-area">
    <svg id="game-svg"><g id="svg-countries"></g></svg>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="doZoom(1.5)" title="확대">+</button>
      <button class="zoom-btn" onclick="doZoom(0.67)" title="축소">−</button>
      <button class="zoom-btn" onclick="resetZoom()" title="초기화" style="font-size:.85rem">↺</button>
    </div>
    <div class="loading-overlay" id="loading-overlay">
      <div class="loading-spinner"></div>
      <div>지도 불러오는 중...</div>
    </div>
    <div id="map-tooltip" class="map-tooltip"></div>
  </div>
  <div class="game-footer">
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 / 0</div>
  </div>
</section>

<!-- ══════════ 결과 화면 ══════════ -->
<section id="result-screen" class="screen">
  <div class="result-trophy"      id="result-trophy">🏆</div>
  <div class="result-title"       id="result-title">게임 완료!</div>
  <div class="result-score-big"   id="result-score-big">0</div>
  <div class="result-score-label">점</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-value" id="r-correct">0</div>
      <div class="result-stat-label">✅ 정답</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-value" id="r-wrong">0</div>
      <div class="result-stat-label">❌ 오답</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-value" id="r-streak">0</div>
      <div class="result-stat-label">🔥 최고연속</div>
    </div>
  </div>
  <div class="result-grade" id="result-grade"></div>
  <div class="result-btns">
    <button class="btn-result primary"   id="btn-retry">🔄 다시 도전</button>
    <button class="btn-result secondary" onclick="showScreen('select-screen')">🗺️ 지도 선택</button>
    <button class="btn-result secondary" onclick="showScreen('home-screen')">🏠 처음으로</button>
  </div>
</section>

<script>
/* ════════════════════════════════════════
   지도 목록 (6개 대륙)
════════════════════════════════════════ */
const MAPS = [
  { id:'세계지도', name:'세계 지도 전체', icon:'🌍', color:'#1976d2', isWorld: true },
  { id:'아시아',   name:'아시아',         icon:'🏯', color:'#e65100' },
  { id:'유럽',     name:'유럽',           icon:'🏰', color:'#6a1b9a' },
  { id:'아메리카', name:'아메리카',       icon:'🌎', color:'#2e7d32' },
  { id:'아프리카', name:'아프리카',       icon:'🦁', color:'#f57f17' },
  { id:'오세아니아',name:'오세아니아',    icon:'🦘', color:'#00838f' },
];

/* ════════════════════════════════════════

function chooseMode(mode) {
  currentMode = mode;
  const sub = document.querySelector('.select-header-sub');
  if (sub) sub.textContent = mode === 'quiz'
    ? '퀴즈를 풀 지역을 골라봐요!'
    : '탐험할 지역을 골라봐요!';
  showScreen('select-screen');
}

function renderSelectScreen() {
  const grid = document.getElementById('continent-grid');
  grid.innerHTML = '';

  MAPS.forEach(map => {
    // 출제 가능 나라 수 계산
    const codes = MAP_CODES[map.id];
    const count = map.isWorld
      ? WORLD_QUIZ.filter(c => KR[c]).length
      : (codes || []).filter(c => KR[c]).length;

    const card = document.createElement('div');
    card.className = 'continent-card' + (map.isWorld ? ' world-card' : '');
    card.style.setProperty('--cc', map.color);
    card.innerHTML = `
      <div class="cc-emoji">${map.icon}</div>
      <div class="cc-name">${map.name}</div>
      <div class="cc-sub">${count}개 나라 도전</div>
    `;
    card.addEventListener('click', () => currentMode === 'quiz' ? startGame(map) : startStudy(map));
    grid.appendChild(card);
  });
}
renderSelectScreen();

/* ════════════════════════════════════════
   전역 D3 상태
════════════════════════════════════════ */
let worldTopo  = null;
let svgSel, zoomBeh;
let gPath     = null;   // D3 path 생성기 (전역 공유)
let gFeatures = null;   // 전체 국가 feature 배열 (전역 공유)

/* ════════════════════════════════════════
   게임 상태
════════════════════════════════════════ */
let currentMap  = null;
let currentMode = 'quiz';   // 'quiz' | 'study'
let quizList    = [];
let qIndex      = 0;
let score       = 0, streak = 0, maxStreak = 0;
let correctCnt  = 0, wrongCnt = 0;
let waiting     = false;

/* ════════════════════════════════════════
   학습 모드 시작
════════════════════════════════════════ */
async function startStudy(map) {
  currentMap  = map;
  currentMode = 'study';

  showScreen('game-screen');
  setLoading(true);

  // UI 조정
  document.getElementById('game-map-name').textContent = map.icon + ' ' + map.name + ' 학습';
  document.getElementById('hud-group').classList.add('hud-hidden');
  document.querySelector('.game-footer').classList.add('hud-hidden');
  const bar = document.querySelector('.question-bar');
  bar.classList.add('study-bar');
  bar.classList.remove('fb-correct', 'fb-wrong');
  document.querySelector('.question-label').textContent   = '📚 학습 모드';
  document.getElementById('question-country').textContent = '마우스를 올려 나라 이름을 확인해 보세요!';

  if (!worldTopo) {
    try {
      worldTopo = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    } catch {
      alert('지도 데이터를 불러오지 못했어요.\n인터넷 연결을 확인해 주세요.');
      showScreen('select-screen'); return;
    }
  }

  renderMap();
  setLoading(false);
}

/* ════════════════════════════════════════
   게임 시작
════════════════════════════════════════ */
async function startGame(map) {
  currentMap  = map;
  currentMode = 'quiz';
  score = 0; streak = 0; maxStreak = 0;
  correctCnt = 0; wrongCnt = 0; qIndex = 0; waiting = false;

  showScreen('game-screen');
  setLoading(true);

  // UI 퀴즈 모드로 복원
  document.getElementById('hud-group').classList.remove('hud-hidden');
  document.querySelector('.game-footer').classList.remove('hud-hidden');
  const bar = document.querySelector('.question-bar');
  bar.classList.remove('study-bar', 'fb-correct', 'fb-wrong');
  document.querySelector('.question-label').textContent = '지도에서 찾아보세요!';

  if (!worldTopo) {
    try {
      worldTopo = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    } catch {
      alert('지도 데이터를 불러오지 못했어요.\n인터넷 연결을 확인해 주세요.');
      showScreen('select-screen'); return;
    }
  }

  // 출제 목록 구성
  const codes = MAP_CODES[map.id];
  const rawQuiz = map.isWorld ? WORLD_QUIZ : (codes || []);
  quizList = shuffle(rawQuiz.filter(c => KR[c]));

  document.getElementById('game-map-name').textContent = map.icon + ' ' + map.name;
  updateHUD();
  renderMap();
  setLoading(false);
  askQuestion();
}

/* ════════════════════════════════════════
   D3 지도 렌더링
════════════════════════════════════════ */
function renderMap() {
  const area = document.getElementById('map-area');
  const w = area.clientWidth  || 800;
  const h = area.clientHeight || 500;

  const svg = d3.select('#game-svg').attr('viewBox', `0 0 ${w} ${h}`);
  const g   = d3.select('#svg-countries');
  g.selectAll('*').remove();

  const features   = topojson.feature(worldTopo, worldTopo.objects.countries).features;
  const regionCodes = MAP_CODES[currentMap.id];

  // 프로젝션 설정
  let projection;
  if (!regionCodes) {
    // 세계지도: Natural Earth 전체
    projection = d3.geoNaturalEarth1().rotate([-150, 0]).fitSize([w, h], { type:'Sphere' });
  } else {
    // 지역 지도: 해당 나라에 맞게 자동 피팅
    const regionFeats = features.filter(f => regionCodes.includes(+f.id));
    const col = { type:'FeatureCollection', features: regionFeats };
    const pad = Math.min(w, h) * 0.07;
    projection = d3.geoMercator()
      .fitExtent([[pad, pad], [w - pad, h - pad]], col);
  }

  const path = d3.geoPath().projection(projection);
  gPath     = path;
  gFeatures = features;

  // 바다 배경
  g.append('path')
   .datum({ type:'Sphere' })
   .attr('d', path)
   .attr('fill', '#b3d9f5');

  // 국가 경로
  const paths = g.selectAll('.country')
   .data(features)
   .join('path')
   .attr('class', 'country')
   .attr('d', path)
   .attr('data-id', d => +d.id)
   .attr('fill', d => getCountryFill(+d.id));

  if (currentMode === 'study') {
    const tt = document.getElementById('map-tooltip');
    const area = document.getElementById('map-area');
    paths
      .on('mouseover', (event, d) => {
        const name = KR[+d.id];
        if (!name) return;
        tt.textContent = name;
        tt.style.display = 'block';
        d3.select(event.currentTarget).attr('stroke', '#1565c0').attr('stroke-width', 2.5);
      })
      .on('mousemove', (event) => {
        const rect = area.getBoundingClientRect();
        tt.style.left = (event.clientX - rect.left + 14) + 'px';
        tt.style.top  = (event.clientY - rect.top  - 44) + 'px';
      })
      .on('mouseout', (event, d) => {
        tt.style.display = 'none';
        d3.select(event.currentTarget)
          .attr('stroke', 'rgba(255,255,255,.7)').attr('stroke-width', .5);
      });
  } else {
    paths.on('click', onCountryClick);
  }

  // 줌 설정
  zoomBeh = d3.zoom()
    .scaleExtent([0.5, 10])
    .on('zoom', ev => g.attr('transform', ev.transform));
  svgSel = svg;
  svg.call(zoomBeh);
}

function compColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const h = n => n.toString(16).padStart(2,'0');
  return `#${h(255-r)}${h(255-g)}${h(255-b)}`;
}

function getCountryFill(isoId) {
  const regionCodes = MAP_CODES[currentMap.id];
  if (!regionCodes) {
    // 세계지도: 대륙 색상
    const cont = ISO_CONT[isoId];
    return CONTINENT_FILL[cont] || CONTINENT_FILL.Other;
  }
  // 지역 지도: 해당 대륙 = 지역색, 나머지 = 회색
  return regionCodes.includes(isoId) ? REGION_FILL[currentMap.id] : '#B8C8D0';
}

/* ════════════════════════════════════════
   문제 출제
════════════════════════════════════════ */
function askQuestion() {
  if (qIndex >= quizList.length) { showResult(); return; }
  // 이전 플래시·마커 제거
  d3.selectAll('.country')
    .classed('flash-correct', false)
    .classed('flash-wrong', false)
    .classed('flash-answer', false)
    .attr('fill', d => getCountryFill(+d.id));
  d3.select('#svg-countries').selectAll('.answer-pin').remove();
  document.getElementById('question-country').textContent = KR[quizList[qIndex]] || '?';
  updateProgress();
}

/* ════════════════════════════════════════
   나라 클릭 처리
════════════════════════════════════════ */
function onCountryClick(event, d) {
  if (waiting) return;
  waiting = true;  // 클릭 즉시 잠금

  const clickedId = +d.id;
  const correctId = quizList[qIndex];

  if (clickedId === correctId) {
    // ── 정답 ──
    streak++; maxStreak = Math.max(maxStreak, streak); correctCnt++;
    const earned = 10 + Math.min(streak - 1, 10) * 5;
    score += earned;
    updateHUD();
    d3.select(event.currentTarget).classed('flash-correct', true)
      .attr('fill', compColor(getCountryFill(correctId)));
    showFeedback(true, earned);
    showAnswerPin(correctId);

    setTimeout(() => {
      hideFeedback();
      d3.select('#svg-countries').selectAll('.answer-pin').remove();
      if (svgSel && zoomBeh)
        svgSel.transition().duration(500).call(zoomBeh.transform, d3.zoomIdentity);
      setTimeout(() => {
        waiting = false;
        qIndex++;
        askQuestion();
      }, 520);
    }, 2000);

  } else {
    // ── 오답 ──
    streak = 0; wrongCnt++;
    updateHUD();
    d3.select(event.currentTarget).classed('flash-wrong', true)
      .attr('fill', '#ef5350');
    d3.selectAll('.country').filter(f => +f.id === correctId).classed('flash-answer', true)
      .attr('fill', '#2979FF');
    showFeedback(false, 0);
    showAnswerPin(correctId);

    setTimeout(() => {
      hideFeedback();
      d3.select('#svg-countries').selectAll('.answer-pin').remove();
      if (svgSel && zoomBeh)
        svgSel.transition().duration(500).call(zoomBeh.transform, d3.zoomIdentity);
      // 줌 복귀(500ms) 후 다음 문제
      setTimeout(() => {
        waiting = false;
        qIndex++;
        askQuestion();
      }, 520);
    }, 2800);
  }
}

function showAnswerPin(correctId) {
  const feat = gFeatures && gFeatures.find(f => +f.id === correctId);
  if (!feat || !gPath) return;
  const cent = gPath.centroid(feat);
  if (!cent || isNaN(cent[0])) return;

  // 정답 위치로 자동 줌 (원·텍스트 없이 줌만)
  const area = document.getElementById('map-area');
  const zw = area.clientWidth, zh = area.clientHeight, zs = 2;
  if (svgSel && zoomBeh)
    svgSel.transition().duration(700)
      .call(zoomBeh.transform,
        d3.zoomIdentity.translate(zw/2 - cent[0]*zs, zh/2 - cent[1]*zs).scale(zs));
}

/* ════════════════════════════════════════
   줌 버튼
════════════════════════════════════════ */
function doZoom(f) {
  if (svgSel && zoomBeh) svgSel.transition().duration(300).call(zoomBeh.scaleBy, f);
}
function resetZoom() {
  if (svgSel && zoomBeh) svgSel.transition().duration(400).call(zoomBeh.transform, d3.zoomIdentity);
}

/* ════════════════════════════════════════
   피드백
════════════════════════════════════════ */
function showFeedback(correct, earned) {
  const bar     = document.querySelector('.question-bar');
  const label   = document.querySelector('.question-label');
  const country = document.getElementById('question-country');
  if (correct) {
    bar.classList.add('fb-correct');
    label.textContent   = streak >= 3 ? `🔥 ${streak}연속 정답! 굉장해요!` : streak >= 2 ? `🔥 ${streak}연속 정답!` : '✅ 정답이에요!';
    country.textContent = `+${earned}점`;
  } else {
    bar.classList.add('fb-wrong');
    label.textContent   = '❌ 아쉬워요! 주황색 나라가 정답이에요.';
    country.textContent = KR[quizList[qIndex]] || '';
  }
}
function hideFeedback() {
  const bar = document.querySelector('.question-bar');
  bar.classList.remove('fb-correct', 'fb-wrong');
  document.querySelector('.question-label').textContent = '지도에서 찾아보세요!';
}

/* ════════════════════════════════════════
   HUD / 진행바
════════════════════════════════════════ */
function updateHUD() {
  const sb = document.getElementById('streak-badge');
  sb.textContent = `🔥 ${streak}연속`;
  sb.className   = 'streak-badge' + (streak >= 3 ? ' hot' : '');
  document.getElementById('score-badge').textContent = score + '점';
}
function updateProgress() {
  const t = quizList.length;
  document.getElementById('progress-fill').style.width = (qIndex / t * 100) + '%';
  document.getElementById('progress-text').textContent = `${qIndex} / ${t}`;
}

/* ════════════════════════════════════════
   결과
════════════════════════════════════════ */
function showResult() {
  const pct = quizList.length ? Math.round(correctCnt / quizList.length * 100) : 0;
  const g = pct >= 90 ? { icon:'🏆', title:'완벽해요! 🎉', msg:'🌟 세계 지리 마스터!' }
          : pct >= 70 ? { icon:'🥈', title:'잘했어요! 👏', msg:'💪 거의 다 왔어요!' }
          : pct >= 50 ? { icon:'🥉', title:'좋아요! 😊',   msg:'🗺️ 더 연습하면 잘할 수 있어요!' }
          :             { icon:'📚', title:'다시 도전! 💪', msg:'📖 지도를 보면서 연습해봐요!' };
  document.getElementById('result-trophy').textContent    = g.icon;
  document.getElementById('result-title').textContent     = g.title;
  document.getElementById('result-score-big').textContent = score;
  document.getElementById('r-correct').textContent        = correctCnt;
  document.getElementById('r-wrong').textContent          = wrongCnt;
  document.getElementById('r-streak').textContent         = maxStreak;
  document.getElementById('result-grade').textContent     = g.msg;
  document.getElementById('btn-retry').onclick = () => startGame(currentMap);
  showScreen('result-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function confirmExit() {
  const msg = currentMode === 'study' ? '학습을 그만하고 나가시겠어요?' : '게임을 그만하고 나가시겠어요?';
  if (confirm(msg)) {
    document.getElementById('map-tooltip').style.display = 'none';
    showScreen('select-screen');
  }
}
function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !on);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
